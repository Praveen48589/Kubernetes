kind: Pod
apiVersion: v1
metadata:
  name: init-demo

spec:
  initContainers:
  - name: init-container
    image: busybox:latest
    command: ["sh", "-c", "echo 'Initialization started ... '; sleep 10 ; echo 'Initialization stop ...'"]

  containers:
  - name: main-container
    image: busybox:latest
    command: ["sh", "-c", "echo 'Main container started'"]

  
