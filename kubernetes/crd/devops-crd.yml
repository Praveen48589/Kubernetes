apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: devopsbatches.praveentomar.com
spec:
  group: praveentomar.com
  names:
    plural: devopsbatches
    singular: devopsbatch
    kind: DevOpsBatch
    shortNames:
      - prince
      - tomar
      - pst
  scope: Namespaced

    

  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              name:
                type: string
                description: This is name of the devops batch   
              duration:
                type: string
                description: This is duation of the devops batch
              mode: 
                type: string
                description: This is the mode of the batch eg >> live/recorded
              platform:
                type: string
                description: This is the platform of the batch
